# Render Blueprint — defines the backend + frontend services in one file.
# After importing this blueprint via render.com/select-repo, Render spins
# up both services and links them automatically.
#
#   Backend  → FastAPI app at https://<backend-service>.onrender.com
#              serving /api/* (including the Behance proxy)
#   Frontend → built React app served as static files at
#              https://<frontend-service>.onrender.com
#
# After the first deploy:
#   1. Copy the BACKEND URL into the frontend's REACT_APP_BACKEND_URL var
#      (Render dashboard → frontend service → Environment) and trigger a
#      manual rebuild.
#   2. (Optional, recommended) restrict CORS_ORIGINS on the backend to
#      your frontend's public URL instead of "*".

services:
  # ---------- FastAPI backend ----------
  - type: web
    name: durrellsmith-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/
    envVars:
      # Permissive by default so the frontend can fetch /api/* from any
      # origin. After deploy, restrict this to your frontend's URL.
      - key: CORS_ORIGINS
        value: "*"
      # Mongo is OPTIONAL — the portfolio doesn't need it. Leave these
      # unset to skip Mongo entirely; the /api/status template endpoints
      # will 503 but /api/behance/{username} works fine.
      # - key: MONGO_URL
      #   sync: false
      # - key: DB_NAME
      #   value: portfolio

  # ---------- React frontend (static) ----------
  - type: web
    name: durrellsmith-frontend
    runtime: static
    rootDir: frontend
    buildCommand: yarn install --frozen-lockfile && yarn build
    staticPublishPath: ./build
    # SPA fallback — every unmatched URL serves the React app so deep
    # links (#work, #about, etc.) keep working on refresh.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Set this to your backend service's public URL after first deploy.
      # The frontend reads it at BUILD time, so editing this and clicking
      # "Manual Deploy" will rebake the value into the bundle.
      - key: REACT_APP_BACKEND_URL
        sync: false
